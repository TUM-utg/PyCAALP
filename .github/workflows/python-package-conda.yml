name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            python3-dev \
            libjpeg-dev \
            zlib1g-dev \
            libpng-dev

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Import PyCAALP
        run: |
          python - <<EOF
          import pycaalp
          print("PyCAALP imported successfully")
          EOF
